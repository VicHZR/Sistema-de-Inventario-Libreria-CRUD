name: Frontend CI - Angular

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci # 'npm ci' es más rápido y limpio para entornos de CI que 'npm install'
        working-directory: frontend

      - name: Construir proyecto (Producción)
        run: npm run build -- --configuration production
        working-directory: frontend

      - name: Subir carpeta de distribución
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/ # Ajusta esta ruta si tu carpeta de salida es distinta (ej: dist/nombre-app)
          retention-days: 5
